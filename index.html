<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>おんていLab 🧪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --primary: #4ecdc4;
      --secondary: #2c3e6b;
      --accent: #ff6b6b;
      --success: #2ed573;
      --warn: #ffd32a;
      --bg: #f0f4ff;
      --card: #ffffff;
      --text: #2d3436;
      --muted: #888fa3;
      
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8faff;
      --color-background-tertiary: #eedfdf;
      --color-border-secondary: #e0e6f0;
      --color-border-tertiary: #e5e9f5;
      --color-text-primary: #2d3436;
      --color-text-secondary: #888fa3;
      --color-background-info: rgba(78,205,196,0.15);
      --color-text-info: #2ea39b;
      --color-background-warning: rgba(255,211,42,0.15);
      --color-text-warning: #c9a000;
      --color-background-success: rgba(46,213,115,0.15);
      --color-text-success: #1c9e5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 20% 20%, #dde8ff 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, #d4f5f2 0%, transparent 50%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
    }
    .screen { display: none; width: 100%; max-width: 460px; animation: fadeIn 0.35s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(44,62,107,0.10), 0 1.5px 4px rgba(44,62,107,0.06);
      margin-bottom: 16px;
      border: 1.5px solid rgba(78,205,196,0.15);
    }

    .app-title {
      font-size: 28px; font-weight: 700; color: var(--secondary);
      letter-spacing: 0.03em; margin-bottom: 4px;
    }
    .app-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }

    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 14px; font-weight: 700; letter-spacing: 0.05em; }
    input, select {
      width: 100%; padding: 13px 16px;
      border-radius: 14px; border: 1.5px solid #e0e6f0;
      font-size: 15px; font-family: inherit;
      background: #f8faff; color: var(--text);
      outline: none; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: var(--primary); background: white; }

    .btn {
      display: block; width: 100%; padding: 16px;
      border-radius: 16px; border: none;
      background: linear-gradient(135deg, var(--primary), #36b8b0);
      color: white; font-weight: 700; font-family: inherit;
      cursor: pointer; font-size: 17px; margin-top: 18px;
      box-shadow: 0 5px 0 #2ea39b, 0 8px 20px rgba(78,205,196,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.03em;
      text-align: center;
      text-decoration: none;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2ea39b; }

    .btn-back {
      background: linear-gradient(135deg, #747d8c, #57606f);
      box-shadow: 0 4px 0 #3d4451;
      font-size: 14px; margin-top: 10px;
    }
    .btn-back:active { box-shadow: 0 2px 0 #3d4451; }

    .level-card { background: var(--card); border: 1.5px solid rgba(78,205,196,0.15); border-radius: 20px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 4px 12px rgba(44,62,107,0.05); }
    .level-btn-area { flex: 1; text-align: left; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .level-title { font-size: 16px; font-weight: 700; color: var(--secondary); margin: 0 0 2px; }
    .level-sub { font-size: 12px; color: var(--muted); margin: 0; }
    .help-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); background: #f8faff; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 16px; color: var(--secondary); transition: background 0.15s; }
    .help-btn:hover { background: #e8ecf8; }
    .play-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--primary), #36b8b0); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-size: 14px; box-shadow: 0 3px 0 #2ea39b; }
    .play-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2ea39b; }

    .panel-wrap { background: #f8faff; border: 1.5px solid #dde5f5; border-radius: 20px; padding: 0; overflow: hidden; margin-bottom: 12px; animation: fadeIn 0.25s ease; }
    .panel-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #dde5f5; background: #edf2fc; }
    .panel-title { font-size: 13px; font-weight: 700; color: var(--secondary); margin: 0; }
    .panel-body { padding: 14px 16px; }

    .step-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--secondary); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
    .step-text { font-size: 13px; color: var(--text); line-height: 1.5; }
    .step-text b { font-weight: 700; color: var(--accent); }

    .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 8px; margin-top: 6px; font-weight: 700; }
    .badge-info { background: rgba(78,205,196,0.15); color: #2ea39b; }
    .badge-warn { background: rgba(255,211,42,0.15); color: #b18c00; }
    .badge-success { background: rgba(46,213,115,0.15); color: #1c9e5a; }

    .meter-demo { background: #eef2fa; border-radius: 12px; padding: 10px 12px; margin-top: 8px; font-size: 12px; border: 1px solid #e0e6f0; }
    .gauge-demo { height: 10px; background: #dcdde1; border-radius: 5px; position: relative; margin: 6px 0; overflow: hidden; }
    .gz10-demo { position: absolute; left: 40%; width: 20%; height: 100%; background: rgba(255,211,42,0.5); }
    .gz2-demo { position: absolute; left: 48%; width: 4%; height: 100%; background: rgba(46,213,115,0.8); }
    .gptr-demo { position: absolute; top: 0; width: 4px; height: 100%; background: var(--secondary); border-radius: 2px; transform: translateX(-50%); }
    .gauge-labels-demo { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); }
    .section-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 12px 0 6px; }
    .lv-badge { display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 10px; width: 48px; }

    .game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .q-badge { background: var(--bg); color: var(--secondary); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; border: 1.5px solid #dde5f5; }
    .score-badge { background: linear-gradient(135deg, var(--secondary), #3d5498); color: white; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; }
    .note-display { display: flex; justify-content: space-around; align-items: center; margin: 16px 0 10px; }
    .note-box { text-align: center; }
    .note-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 4px; }
    .note-val { font-family: 'Space Mono', monospace; font-size: 38px; font-weight: 700; color: var(--secondary); min-height: 48px; }
    .note-arrow { font-size: 22px; color: #ced6e0; padding-top: 14px; }
    .phase-msg { font-size: 15px; font-weight: 700; color: var(--accent); min-height: 26px; text-align: center; margin-bottom: 4px; transition: all 0.3s; }
    .phase-msg.listening { color: var(--primary); }
    .phase-msg.ready { color: var(--secondary); }
    
    .target-hint { font-size: 12px; font-weight: 700; color: #b18c00; text-align: center; margin-bottom: 8px; min-height: 18px; line-height: 1.4; padding: 0 8px; }

    .cent-display { font-family: 'Space Mono', monospace; font-size: 44px; font-weight: 700; min-height: 58px; color: var(--text); text-align: center; margin: 6px 0; transition: color 0.2s; }
    .cent-display.perfect { color: var(--success); }
    .cent-display.good { color: var(--warn); }
    .cent-display.off { color: var(--accent); }

    .gauge-wrap { position: relative; margin: 12px 0; }
    .gauge-bg { height: 22px; background: #e8ecf5; border-radius: 11px; overflow: hidden; position: relative; }
    .gauge-zone-10 { position: absolute; left: 40%; width: 20%; height: 100%; background: linear-gradient(90deg, rgba(255,211,42,0.35), rgba(255,211,42,0.55)); }
    .gauge-zone-2 { position: absolute; left: 48%; width: 4%; height: 100%; background: linear-gradient(90deg, rgba(46,213,115,0.6), rgba(46,213,115,0.9)); }
    .gauge-ptr { position: absolute; top: 0; width: 6px; height: 100%; background: var(--secondary); border-radius: 3px; transform: translateX(-50%); transition: left 0.07s linear; box-shadow: 0 0 8px rgba(44,62,107,0.4); }
    .gauge-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 2px; }

    .hold-wrap { background: #f0fff8; border-radius: 14px; padding: 12px 16px; margin-top: 10px; border: 1.5px solid rgba(46,213,115,0.3); visibility: hidden; transition: visibility 0.2s; }
    .hold-label { font-size: 14px; font-weight: 700; color: var(--success); margin-bottom: 6px; }
    .prog-bg { height: 10px; background: #d4f5e9; border-radius: 5px; overflow: hidden; }
    .prog-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--success), #26d865); transition: width 0.1s linear; }

    .combo-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) scale(0); background: var(--secondary); color: white; padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 18px; box-shadow: 0 8px 24px rgba(44,62,107,0.3); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; opacity: 0; pointer-events: none; z-index: 100; }
    .combo-toast.show { transform: translateX(-50%) scale(1); opacity: 1; }

    .result-big { font-family: 'Space Mono', monospace; font-size: 72px; font-weight: 700; color: var(--secondary); text-align: center; margin: 12px 0; text-shadow: 0 4px 0 rgba(44,62,107,0.12); }
    .result-label { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 0.1em; text-align: center; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0; }
    .result-cell { background: var(--bg); border-radius: 14px; padding: 12px 8px; text-align: center; }
    .result-cell .val { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; color: var(--secondary); }
    .result-cell .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .log-section { margin-top: 16px; }
    .log-title { font-size: 13px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 8px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .log-table th { background: var(--bg); color: var(--muted); padding: 7px 8px; font-weight: 700; text-align: center; border-bottom: 1px solid #e5e9f5; }
    .log-table td { padding: 7px 8px; text-align: center; border-bottom: 1px solid #f0f3fb; }
    .log-table tr:last-child td { border-bottom: none; }
    .tag-perfect { background: #e8fdf3; color: #1c9e5a; padding: 2px 8px; border-radius: 8px; font-weight: 700; font-size: 12px; }
    .tag-great { background: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 8px; font-weight: 700; font-size: 12px; }
    .tag-good { background: #fff9e0; color: #c9a000; padding: 2px 8px; border-radius: 8px; font-weight: 700; font-size: 12px; }
    .tag-almost { background: #f1f2f6; color: #57606f; padding: 2px 8px; border-radius: 8px; font-weight: 700; font-size: 12px; }

    .btn-pass { background: linear-gradient(135deg, #747d8c, #57606f); box-shadow: 0 4px 0 #3d4451; font-size: 14px; margin-top: 10px; width: 50%; }
  </style>
</head>
<body>

<div id="screen-login" class="screen active">
  <div class="card">
    <div class="app-title">おんていLab 🧪</div>
    <div class="app-sub">自分の音をリアルタイム分析！<br>生成AIとつくった吹奏楽部のための音程トレーニングアプリ</div>
    <label>研究員ネーム（お名前）</label>
    <input type="text" id="user-name" placeholder="例：吹奏楽 太郎">
    <label>担当楽器グループ</label>
    <select id="user-inst">
      <option value="1">① フルート (B♭5音域)</option>
      <option value="2">② クラ・アルトSax・Tp・Ob (B♭4音域)</option>
      <option value="3">③ Hr・Tb・Euph・テナー・バスクラ (B♭3音域)</option>
      <option value="4">④ チューバ・コントラバス (B♭2音域)</option>
    </select>
    <button class="btn" onclick="goToMenu()">🔬 ラボ（練習室）に入る</button>
  </div>
</div>

<div id="screen-menu" class="screen">
  <div class="card" style="padding: 24px 16px;">
    <h2 style="color:var(--secondary); margin-bottom:4px;">実験メニュー</h2>
    <p style="font-size:13px; color:var(--muted); margin-bottom:16px;">「❓」を押すと詳しい使い方が表示されます</p>
    
    <div id="menu-container"></div>
  </div>
  <button class="btn btn-back" onclick="showScreen('screen-login')">← トップに戻る</button>
</div>

<div id="screen-game" class="screen">
  <div class="card">
    <div class="game-header">
      <div class="q-badge" id="q-label">課題 1/10</div>
      <div class="score-badge">スコア: <span id="current-score">0</span></div>
    </div>
    <div class="note-display">
      <div class="note-box">
        <div class="note-label">きほんの音</div>
        <div class="note-val" id="ref-note">--</div>
      </div>
      <div class="note-arrow">▶</div>
      <div class="note-box">
        <div class="note-label">ねらう音</div>
        <div class="note-val" id="target-note">--</div>
      </div>
    </div>

    <div class="phase-msg" id="phase-msg">じゅんび中...</div>
    <div class="target-hint" id="target-hint"></div>
    <div class="cent-display" id="cent-val">--</div>

    <div class="gauge-wrap">
      <div class="gauge-bg">
        <div class="gauge-zone-10"></div>
        <div class="gauge-zone-2"></div>
        <div class="gauge-ptr" id="pointer" style="left:50%"></div>
      </div>
      <div class="gauge-labels"><span>-50¢</span><span>±10¢</span><span>±2¢</span><span>±10¢</span><span>+50¢</span></div>
    </div>

    <div class="hold-wrap" id="hold-wrap">
      <div class="hold-label" id="hold-label">測定までカウントダウン</div>
      <div class="prog-bg"><div id="prog-fill" class="prog-fill"></div></div>
    </div>
  </div>
  <button class="btn btn-pass" onclick="passQuestion()">次の問題へ進む</button>
</div>

<div id="screen-result" class="screen">
  <div class="card">
    <div class="result-label">ごうけいスコア</div>
    <div class="result-big" id="result-score">0</div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="val" id="res-perfect">0</div>
        <div class="lbl">✨ Excellent</div>
      </div>
      <div class="result-cell">
        <div class="val" id="res-good">0</div>
        <div class="lbl">🎯 Great / Good</div>
      </div>
      <div class="result-cell">
        <div class="val" id="res-pass">0</div>
        <div class="lbl">🐾 パス / Almost</div>
      </div>
    </div>
    <div class="log-section">
      <div class="log-title">📋 今回の実験ログ</div>
      <table class="log-table">
        <thead><tr><th>#</th><th>ねらった音</th><th>ズレ</th><th>はんてい</th><th>ポイント</th></tr></thead>
        <tbody id="log-tbody"></tbody>
      </table>
    </div>
  </div>
  <button class="btn" onclick="location.reload()">🔁 もう一度チャレンジする！</button>
</div>

<div class="combo-toast" id="combo-toast"></div>

<script>
const GAS_URL = ""; 

// ─── STATE ───────────────────────────────────────────────
let audioCtx, refOsc, micStream, analyst, source;
let currentLevel = 1, qNum = 0, totalScore = 0, combo = 0;
let phase = 'idle';
let refFreq, targetFreq;
let rafId = null;
let instGroup = "1";
let resultLog = [];
let perfCount = 0, goodCount = 0, passCount = 0;
let openHelpId = null; 

const baseBflats = { "1": 932.33, "2": 466.16, "3": 233.08, "4": 116.54 };

// ─── LEVELS DATA ──────────────────────────────────────────
const levelsData = [
  {
    id: 1,
    badge: 'Lv.1',
    title: 'ユニゾン',
    sub: 'おなじ音をぴったり合わせる練習',
    color: 'info',
    steps: [
      { n: 1, text: 'きほんの音（B♭）が<b>2.5秒間</b>鳴ります。耳でしっかりおぼえましょう！' },
      { n: 2, text: '音が止まったら、がっきで<b>5秒間のロングトーン</b>をまっすぐ吹いてください。' },
      { n: 3, text: '緑のバーがタイマーになっています。<b>5秒目のしゅんかん</b>の音程で一発ジャッジします！' },
      { n: 4, text: '±2¢ならExcellent!(50点)、±10¢ならGreat!(30点)、±50¢ならGood!(20点)で、Good以上なら<b>かみふぶき</b>が舞います！' }
    ],
    note: '針が左 ➔ 音が少し低め（口の形をそっと締めてみてね） / 針が右 ➔ 音が少し高め（息をリラックスしてゆるめてみてね）',
    targetText: null,
    ptrPos: '50%'
  },
  {
    id: 2,
    badge: 'Lv.2',
    title: 'パワーコード',
    sub: '5度・4度のハーモニーを豊かに響かせる',
    color: 'warning',
    steps: [
      { n: 1, text: 'きほんの音が鳴ったあと、次に<b>5度上（または4度下）</b>のハモり音をねらいます。' },
      { n: 2, text: '5秒間のカウントダウンタイマーが終わる瞬間のピッチをねらいすましましょう。' },
      { n: 3, text: '5度や4度はアンサンブルの骨組みになる大切な音です。まんなか（0¢）をしっかりねらいましょう！' },
      { n: 4, text: 'レベル2では、ゲットできるポイントがすべて<b>【2倍】</b>にアップします！' }
    ],
    note: '5度・4度は合唱や吹奏楽でハーモニーの「土台」になります。ここがピタッと合うと、一気に響きが豊かになりますよ。',
    targetText: null,
    ptrPos: '50%'
  },
  {
    id: 3,
    badge: 'Lv.3',
    title: '純正律 長3度',
    sub: 'うねりのない極上の響きをつくる',
    color: 'success',
    steps: [
      { n: 1, text: 'きほんの音が鳴ったあと、ハモりの要となる<b>長3度上</b>の音をねらいます。' },
      { n: 2, text: '💡 実は、うねりのない綺麗な和音にするには、ふつうのチューナーのまんなかより<b>【13.7¢低く】</b>吹くのが正解です。' },
      { n: 3, text: 'ふつうのチューナーだと「低い」と表示されて不安になりますが、それが正しい響きです。' },
      { n: 4, text: '<b>このアプリでは、あらかじめその「13.7¢低い音」をメーターのまんなか（0¢）に補正しています！</b> 5秒後にまんなかにくるよう狙ってください。レベル3はポイント<b>【3倍】</b>！' }
    ],
    note: '純正律の3度は、音が合った瞬間に「うねり（濁り）」がフッと消えて、自分の楽器の音が何倍にも大きく響くような快感が味わえます。',
    targetText: '-13.7¢（純正律を0¢として計測します）',
    ptrPos: '38%'
  }
];

// ─── SCREENS ─────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id === 'screen-menu') {
    renderMenu();
  }
}

function goToMenu() {
  const name = document.getElementById('user-name').value.trim();
  if (!name) { alert("研究員ネーム（お名前）を入力してください！"); return; }
  instGroup = document.getElementById('user-inst').value;
  showScreen('screen-menu');
}

// ─── RENDER INTERACTIVE MENU ────────────────────────────
function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';

  levelsData.forEach(lv => {
    const isHelpOpen = openHelpId === lv.id;
    const cardWrap = document.createElement('div');
    
    let html = `
      <div class="level-card" style="${isHelpOpen ? 'border-color: var(--' + (lv.color === 'warning' ? 'warn' : lv.color) + ');' : ''}">
        <div class="lv-badge" style="background: var(--color-background-${lv.color}); color: var(--color-text-${lv.color});">${lv.badge}</div>
        <button class="level-btn-area" onclick="startGame(${lv.id})">
          <p class="level-title">${lv.title}</p>
          <p class="level-sub">${lv.sub}</p>
        </button>
        <button class="help-btn" onclick="toggleHelp(${lv.id})" aria-label="使い方"><i class="ti ${isHelpOpen ? 'ti-x' : 'ti-help'}"></i></button>
        <button class="play-btn" onclick="startGame(${lv.id})" aria-label="スタート"><i class="ti ti-player-play"></i></button>
      </div>
    `;

    if (isHelpOpen) {
      html += `
        <div class="panel-wrap">
          <div class="panel-header">
            <p class="panel-title"><i class="ti ti-info-circle" style="margin-right:4px;"></i>${lv.badge}「${lv.title}」のあそびかた</p>
          </div>
          <div class="panel-body">
            ${lv.steps.map(s => `
              <div class="step-row">
                <div class="step-num">${s.n}</div>
                <div class="step-text">${s.text}</div>
              </div>
            `).join('')}

            <div class="section-label">メーターの見かた（れんしゅうデモ）</div>
            <div class="meter-demo">
              ${lv.targetText ? `<div style="color: #b18c00; font-weight:700; margin-bottom:4px;"><i class="ti ti-alert-triangle"></i> 目標：${lv.targetText}</div>` : ''}
              <div class="gauge-demo">
                <div class="gz10-demo"></div>
                <div class="gz2-demo"></div>
                <div class="gptr-demo" style="left:${lv.ptrPos}"></div>
              </div>
              <div class="gauge-labels-demo"><span>-50¢（低い）</span><span>±0¢（中央）</span><span>+50¢（高い）</span></div>
              <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
                <span class="badge badge-success">緑ゾーン ±2¢ ➔ Excellent ✨ (50点)</span>
                <span class="badge badge-info" style="background:rgba(3,105,161,0.1); color:#0369a1;">青ゾーン ±10¢ ➔ Great 🎯 (30点)</span>
                <span class="badge badge-warn">黄ゾーン ±50¢ ➔ Good ⭕ (20点)</span>
                ${lv.id === 3 ? '<span class="badge badge-success" style="margin-top:2px; background:#e8fdf3; color:#1c9e5a;">★ アプリが自動で-13.7¢をまんなかに調整してあります！</span>' : ''}
              </div>
            </div>

            <div class="section-label">じょうたつへのヒント</div>
            <p style="font-size:12px; color: var(--text); line-height:1.6; background:#fff; padding:8px; border-radius:8px; border:1px solid #e0e6f0;">${lv.note}</p>
          </div>
        </div>
      `;
    }
    cardWrap.innerHTML = html;
    container.appendChild(cardWrap);
  });
}

function toggleHelp(id) {
  openHelpId = openHelpId === id ? null : id;
  renderMenu();
}

// ─── START GAME ──────────────────────────────────────────
async function startGame(lv) {
  currentLevel = lv; qNum = 0; totalScore = 0; combo = 0;
  resultLog = []; perfCount = 0; goodCount = 0; passCount = 0;
  showScreen('screen-game');
  setPhase('じゅんび中... マイクをONにしています 🎤', 'ready');

  const hintEl = document.getElementById('target-hint');
  if (currentLevel === 3) {
    hintEl.innerHTML = `<i class="ti ti-alert-triangle"></i> ※純正律の長3度（平均律より -13.7¢ 低い音）を画面のまんなかに補正して計測しています！`;
  } else {
    hintEl.textContent = "";
  }

  try {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      throw new Error("このブラウザではマイクへのアクセスが制限されています。");
    }
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    analyst = audioCtx.createAnalyser();
    analyst.fftSize = 2048;
    source = audioCtx.createMediaStreamSource(micStream);
    source.connect(analyst);
    if (audioCtx.state === 'suspended') await audioCtx.resume();
  } catch(e) {
    alert("マイクエラー: " + e.message + "\n\n【たいせつ】GASから直接開くとマイクが拒否されます。GitHub PagesのURLから開いてくださいね！");
    showScreen('screen-menu');
    return;
  }
  nextQuestion();
}

// ─── QUESTION CYCLE ──────────────────────────────────────
function nextQuestion() {
  if (qNum >= 10) return endGame();
  qNum++;
  document.getElementById('q-label').textContent = `課題 ${qNum}/10`;
  document.getElementById('current-score').textContent = totalScore;
  document.getElementById('cent-val').textContent = '--';
  document.getElementById('cent-val').className = 'cent-display';
  document.getElementById('pointer').style.left = '50%';
  
  // タイマー表示をはじめから見えるようにしておく
  document.getElementById('hold-wrap').style.visibility = 'visible';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('hold-label').textContent = `じゅんび中...`;
  
  window.countdownStart = null;
  window.lastCents = null;

  const center = baseBflats[instGroup];
  const offset = Math.floor(Math.random() * 13) - 6;
  refFreq = center * Math.pow(2, offset / 12);

  if (currentLevel === 1) {
    targetFreq = refFreq;
  } else if (currentLevel === 2) {
    targetFreq = refFreq * Math.pow(2, (Math.random() > 0.5 ? 7 : -5) / 12);
  } else {
    targetFreq = refFreq * 1.25; 
  }

  document.getElementById('ref-note').textContent = freqToNote(refFreq);
  document.getElementById('target-note').textContent = freqToNote(targetFreq);

  phase = 'ref';
  setPhase('🎵 きほんの音をきいてね...', 'ready');
  playRef(refFreq);

  setTimeout(() => {
    stopRef();
    phase = 'pitch-detect';
    setPhase('🎤 5秒間 まっすぐ吹いてね！', 'listening');
    
    // ⏰ 5秒カウントダウンタイマーの開始
    window.countdownStart = Date.now();
    
    cancelAnimationFrame(rafId);
    pitchLoop();

    // 🎯 5秒後に一発ジャッジを下す
    setTimeout(() => {
      if (phase !== 'pitch-detect') return; // パスされてたら何もしない
      phase = 'idle';
      cancelAnimationFrame(rafId);

      // 5秒目の時点のズレ（音が拾えていなかったら一応999とする）
      const finalDiff = window.lastCents !== null ? window.lastCents : 999;
      const abs = Math.abs(finalDiff);
      
      let pts = 0;
      let resultStr = "";
      let isPerfect = false; 
      let isGoodOrGreat = false; 

      // 🎯 ご指定の新判定ルール
      if (abs <= 2) {
        pts = 50 * currentLevel;
        resultStr = 'Excellent! ✨';
        isPerfect = true;
        perfCount++;
      } else if (abs <= 10) {
        pts = 30 * currentLevel;
        resultStr = 'Great! 🎯';
        isGoodOrGreat = true;
        goodCount++;
      } else if (abs <= 50) {
        pts = 20 * currentLevel;
        resultStr = 'Good! ⭕';
        isGoodOrGreat = true;
        goodCount++; 
      } else {
        pts = 10 * currentLevel;
        resultStr = 'Almost! 💦';
      }

      // スコアの加算とコンボ処理
      totalScore += pts;
      if (abs <= 50) {
        combo++;
        if (combo >= 3) showComboToast(`${combo}回 れんぞく成功！ 🔥`);
      } else {
        combo = 0; // Almostのときはコンボリセット
      }

      // 🎉 紙吹雪の演出（Good以上なら発動）
      if (isPerfect) {
        confetti({ particleCount: 160, spread: 72, origin: { y: 0.6 } }); 
      } else if (isGoodOrGreat) {
        confetti({ particleCount: 60, spread: 50, origin: { y: 0.6 } }); 
      }

      // 📋 結果ログへの記録
      const diffStr = finalDiff === 999 ? '--' : finalDiff.toFixed(1);
      resultLog.push({ q: qNum, note: freqToNote(targetFreq), diff: diffStr, result: resultStr, pts });

      // 🌐 Googleスプレッドシート（GAS）へのデータ送信
      if (GAS_URL) {
        const userName = document.getElementById('user-name').value.trim();
        fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            userName: userName,
            instrument: instGroup,
            level: currentLevel,
            qNum: qNum,
            result: resultStr,
            diff: diffStr,
            score: pts
          })
        }).catch(e => console.log("GAS送信エラー:", e));
      }
      
      // 次の問題へ
      nextQuestion();

    }, 5000); // 5秒間ロングトーン測定

  }, 2800);
}

function passQuestion() {
  if (phase === 'idle') return;
  phase = 'idle';
  cancelAnimationFrame(rafId);
  stopRef();
  passCount++;
  resultLog.push({ q: qNum, note: freqToNote(targetFreq), diff: '--', result: 'パス 🐾', pts: 0 });
  nextQuestion();
}

// ─── AUDIO ───────────────────────────────────────────────
function playRef(freq) {
  if (!audioCtx) return;
  stopRef();
  refOsc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  
  // 【低音響対策】チューバなどの超低音でもピッチの輪郭が聞こえるよう、倍音が含まれる sawtooth(鋸歯状波)に変更
  refOsc.type = 'sawtooth';
  refOsc.frequency.value = freq;
  
  // 人間の耳の特性に合わせ、低い周波数ほどボリュームを大きめに出し分ける
  let vol = 0.08;
  if (freq < 150) vol = 0.18;      // ④チューバなど
  else if (freq < 300) vol = 0.13; // ③トロンボーンなど

  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.05);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.5);
  refOsc.connect(g).connect(audioCtx.destination);
  refOsc.start();
}
function stopRef() {
  if (refOsc) { try { refOsc.stop(); } catch(e) {} refOsc = null; }
}

// ─── PITCH DETECTION ─────────────────────────────────────
function pitchLoop() {
  if (phase !== 'pitch-detect' || !analyst) return;
  const buf = new Float32Array(analyst.fftSize);
  analyst.getFloatTimeDomainData(buf);
  const freq = autoCorrelate(buf, audioCtx.sampleRate);

  if (freq > 40 && freq < 2500) {
    let cents = 1200 * Math.log2(freq / targetFreq);
    while (cents > 600) cents -= 1200;
    while (cents < -600) cents += 1200;

    updateUI(cents);
    window.lastCents = cents; // 最新のピッチデータを一時保存
  } else {
    window.lastCents = null; // 音が拾えない時はnull
  }
  
  // タイマーの残り時間をプログレスバーに反映
  if (window.countdownStart) {
    const elapsed = (Date.now() - window.countdownStart) / 1000;
    const remaining = Math.max(0, 5 - elapsed);
    document.getElementById('prog-fill').style.width = (remaining / 5 * 100) + '%';
    document.getElementById('hold-label').textContent = `⌛ 測定まであと ${remaining.toFixed(1)} 秒... ロングトーンをキープ！`;
  }

  rafId = requestAnimationFrame(pitchLoop);
}

function updateUI(diff) {
  const el = document.getElementById('cent-val');
  el.textContent = (diff >= 0 ? '+' : '') + diff.toFixed(1) + ' ¢';
  const abs = Math.abs(diff);
  el.className = 'cent-display ' + (abs <= 2 ? 'perfect' : abs <= 10 ? 'good' : 'off');
  const pos = Math.max(0, Math.min(100, 50 + (diff / 50) * 50));
  document.getElementById('pointer').style.left = pos + '%';
}

function showComboToast(msg) {
  const t = document.getElementById('combo-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── END GAME ────────────────────────────────────────────
function endGame() {
  phase = 'idle'; stopRef();
  cancelAnimationFrame(rafId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());

  document.getElementById('result-score').textContent = totalScore;
  document.getElementById('res-perfect').textContent = perfCount;
  document.getElementById('res-good').textContent = goodCount;
  document.getElementById('res-pass').textContent = passCount;

  const tbody = document.getElementById('log-tbody');
  tbody.innerHTML = '';
  resultLog.forEach(r => {
    const tr = document.createElement('tr');
    let tagClass = "tag-almost";
    let pureLabel = "Almost";
    
    if (r.result.includes('Excellent')) { tagClass = "tag-perfect"; pureLabel = "Excellent"; }
    else if (r.result.includes('Great')) { tagClass = "tag-great"; pureLabel = "Great"; }
    else if (r.result.includes('Good')) { tagClass = "tag-good"; pureLabel = "Good"; }
    else if (r.result.includes('パス')) { tagClass = "tag-almost"; pureLabel = "パス"; }

    const tag = `<span class="${tagClass}">${pureLabel}</span>`;
    tr.innerHTML = `<td>${r.q}</td><td>${r.note}</td><td>${r.diff === '--' ? '--' : r.diff + '¢'}</td><td>${tag}</td><td><b>${r.pts}</b></td>`;
    tbody.appendChild(tr);
  });

  if (totalScore > 350) confetti({ particleCount: 250, spread: 120, origin: { y: 0.5 } });
  showScreen('screen-result');
}

function setPhase(msg, cls) {
  const el = document.getElementById('phase-msg');
  el.textContent = msg;
  el.className = 'phase-msg ' + (cls || '');
}

// ─── AUTO CORRELATE (アルゴリズム) ───────────────────────
function autoCorrelate(buf, sr) {
  const SIZE = buf.length;
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  if (Math.sqrt(rms / SIZE) < 0.015) return -1;
  let r1 = 0, r2 = SIZE - 1;
  for (let i = 0; i < SIZE / 2; i++) { if (Math.abs(buf[i]) < 0.2) { r1 = i; break; } }
  for (let i = SIZE - 1; i >= SIZE / 2; i--) { if (Math.abs(buf[i]) < 0.2) { r2 = i; break; } }
  if (r1 >= r2) return -1;
  const b = buf.slice(r1, r2);
  const N = b.length;
  if (N < 4) return -1;
  const c = new Float32Array(N);
  for (let i = 0; i < N; i++) for (let j = 0; j < N - i; j++) c[i] += b[j] * b[j + i];
  let d = 0; while (d < N - 1 && c[d] > c[d + 1]) d++;
  let maxVal = -1, maxPos = -1;
  for (let i = d; i < N; i++) { if (c[i] > maxVal) { maxVal = c[i]; maxPos = i; } }
  if (maxPos <= 0 || maxPos >= N - 1) return -1;
  const x1 = c[maxPos - 1], x2 = c[maxPos], x3 = c[maxPos + 1];
  const a = (x1 + x3 - 2 * x2) / 2;
  const b2 = (x3 - x1) / 2;
  const T0 = a ? maxPos - b2 / (2 * a) : maxPos;
  return sr / T0;
}

function freqToNote(f) {
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const i = Math.round(12 * Math.log2(f / 440)) + 69;
  if (i < 0 || i > 127) return '??';
  return notes[((i % 12) + 12) % 12] + Math.floor(i / 12 - 1);
}
